port: 4400
n_hosts: 4
timeout: 10

# Tracing
tracing_settings:
  logger: !Loki
    endpoint: http://loki:3100/
    host_identifier: node
  tracing: !Otlp
    endpoint: http://tempo:4317/
    sample_ratio: 0.5
    service_name: node
  filter: !EnvFilter
    filters:
      logos-blockchain: debug
  metrics: !Otlp
    endpoint: http://prometheus:9090/api/v1/otlp/v1/metrics
    host_identifier: node
  console: None
  level: INFO
